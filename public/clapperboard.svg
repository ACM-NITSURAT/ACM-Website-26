<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1300" width="100%" height="100%">
  <defs>
    <!-- Realistic subtle gradients for a premium look -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="screwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#d0d0d0"/>
      <stop offset="70%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    
    <!-- Separate clip paths for top and bottom sticks to maintain clean outer edges -->
    <clipPath id="topStickClip">
      <rect x="300" y="250" width="1000" height="88"/>
    </clipPath>
    <clipPath id="bottomStickClip">
      <rect x="300" y="342" width="1000" height="88"/>
    </clipPath>
  </defs>

  <!-- Main Background Slate with Rounded Bottom Corners (Generous padding all around) -->
  <path d="M 300,430 L 1300,430 L 1300,1000 A 40,40 0 0 1 1260,1040 L 340,1040 A 40,40 0 0 1 300,1000 Z" fill="url(#boardGrad)"/>

  <!-- ==================== TOP CLAPPER STICK ==================== -->
  <g clip-path="url(#topStickClip)">
    <rect x="300" y="250" width="1000" height="88" fill="#1a1a1a"/>
    <!-- Stripes slanting down-to-the-right -->
    <polygon points="510,250  600,250  700,338 610,338" fill="#f5f5f5"/>
    <polygon points="690,250  780,250  880,338 790,338" fill="#f5f5f5"/>
    <polygon points="870,250  960,250  1060,338 970,338" fill="#f5f5f5"/>
    <polygon points="1050,250 1140,250 1240,338 1150,338" fill="#f5f5f5"/>
    <polygon points="1230,250 1320,250 1420,338 1330,338" fill="#f5f5f5"/>
    <!-- Left Hinge Plate (Slanting down-right) -->
    <path d="M 300,250 L 490,250 L 520,338 L 300,338 Z" fill="#111111"/>
  </g>

  <!-- ==================== BOTTOM CLAPPER STICK ==================== -->
  <g clip-path="url(#bottomStickClip)">
    <rect x="300" y="342" width="1000" height="88" fill="#1a1a1a"/>
    <!-- Stripes slanting down-to-the-left (Opposite direction) -->
    <polygon points="610,342 700,342 600,430 510,430" fill="#f5f5f5"/>
    <polygon points="790,342 880,342 780,430 690,430" fill="#f5f5f5"/>
    <polygon points="970,342 1060,342 960,430 870,430" fill="#f5f5f5"/>
    <polygon points="1150,342 1240,342 1140,430 1050,430" fill="#f5f5f5"/>
    <polygon points="1330,342 1420,342 1320,430 1230,430" fill="#f5f5f5"/>
    <!-- Left Hinge Plate (Slanting down-left) -->
    <path d="M 300,342 L 520,342 L 490,430 L 300,430 Z" fill="#111111"/>
  </g>

  <!-- Seam shadow line between the two clapper bars -->
  <rect x="300" y="438" width="1000" height="4" fill="#0d0d0d"/>

  <!-- ==================== MECHANICAL SCREWS ==================== -->
  <g stroke="#222" stroke-width="1">
    <!-- Top Hinge Screws -->
    <circle cx="345" cy="294" r="14" fill="url(#screwGrad)"/>
    <circle cx="345" cy="294" r="5" fill="#333"/>
    <circle cx="435" cy="294" r="14" fill="url(#screwGrad)"/>
    <circle cx="435" cy="294" r="5" fill="#333"/>

    <!-- Bottom Hinge Screws -->
    <circle cx="345" cy="386" r="14" fill="url(#screwGrad)"/>
    <circle cx="345" cy="386" r="5" fill="#333"/>
    <circle cx="435" cy="386" r="14" fill="url(#screwGrad)"/>
    <circle cx="435" cy="386" r="5" fill="#333"/>
  </g>

  <!-- ==================== LINES & GRID CRADLE ==================== -->
  <!-- Center Chalk Writing Lines -->
  <line x1="360" y1="580" x2="1050" y2="580" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <line x1="360" y1="710" x2="1050" y2="710" stroke="#ffffff" stroke-width="3" opacity="0.85"/>

  <!-- Lower Grid Layout -->
  <line x1="300" y1="865" x2="1300" y2="865" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <line x1="633" y1="865" x2="633" y2="1040" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <line x1="966" y1="865" x2="966" y2="1040" stroke="#ffffff" stroke-width="3" opacity="0.85"/>

  <!-- ==================== TEXT LABELS ==================== -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="bold" fill="#ffffff" letter-spacing="1" text-anchor="middle" opacity="0.9">
    <!-- Scene Column -->
    <text x="466.5" y="930">SCENE</text>
    
    <!-- Take Column -->
    <text x="800" y="930">TAKE</text>
    
    <!-- Roll Column -->
    <text x="1133" y="930">ROLL</text>
  </g>
</svg>
