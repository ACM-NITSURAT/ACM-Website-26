name: Leaderboard Sync Cron

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  # Allows you to trigger the sync manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger User Profile Sync
        run: |
          curl -X POST https://YOUR_VERCEL_DOMAIN.vercel.app/api/leaderboard/sync \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
          
      - name: Trigger Contests Sync
        # We wait a minute between syncs to avoid overloading the database/APIs
        run: |
          sleep 60
          curl -X POST https://YOUR_VERCEL_DOMAIN.vercel.app/api/leaderboard/contests/sync \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
